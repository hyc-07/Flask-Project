<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时聊天</title>

    <!-- ✅ Socket.IO 库 -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* ✅ 卡片容器 */
        .card-container {
            display: flex;
            width: 100%;
            max-width: 900px;
            height: calc(100vh - 140px);
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            box-sizing: border-box;
        }
        /* ✅ 侧边栏 */
        .sidebar {
            width: 240px;              /* 桌面端固定宽度 */
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;

            /* ✅ 关键：允许侧边栏缩小，但不要完全消失 */
            flex-shrink: 1;            /* 允许缩小 */
            min-width: 150px;          /* 最小宽度，防止缩得太小 */
        }

        .sidebar-header {
            margin-bottom: 0px;
        }

        .sidebar h3 {
            color: #333;
            margin-bottom: 6px;
            font-size: 17px;
        }

        .sidebar p {
            color: #66CD66;
            font-size: 12px;
        }

        .sidebar a {
            color: #666;
            text-decoration: none;
            font-size: 13px;
            margin-top: 10px;
        }

        .sidebar a:hover {
            color: #007bff;
        }
        /* ✅ 个人主页模态框样式 */
        .profile-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
            z-index: 1000;
        }

        .profile-modal.active {
            display: flex;
        }

        .profile-card {
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
        }

        .profile-close-btn {
            position: absolute; top: 12px; right: 16px;
            background: none; border: none; font-size: 1.5em;
            cursor: pointer; color: #888;
        }

        .profile-close-btn:hover { color: #333; }

        .profile-header {
            display: flex; align-items: center; margin-bottom: 20px;
            padding-bottom: 15px; border-bottom: 1px solid #e9ecef;
        }

        .profile-avatar {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: #007bff;
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4em; font-weight: bold;
            margin-right: 15px;
        }

        .profile-meta h3 { margin: 0 0 4px 0; font-size: 18px; }
        .profile-meta .status-text { font-size: 12px; display: flex; align-items: center; }
        .profile-meta .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

        .profile-field { margin-bottom: 18px; }
        .profile-label { font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

        .profile-value {
            font-size: 14px; padding: 8px 0; color: #333;
            border-bottom: 1px solid #e9ecef;
        }

        .profile-input {
            width: 100%; padding: 8px 10px; font-size: 14px;
            border: 1px solid #ddd; border-radius: 8px;
            outline: none; display: none;
        }

        .profile-input:focus { border-color: #007bff; }

        .profile-actions { margin-top: 20px; text-align: right; }

        .btn-edit, .btn-save {
            padding: 6px 16px; border: none; border-radius: 12px;
            cursor: pointer; font-size: 13px; margin-left: 8px;
        }

        .btn-edit { background: #e9ecef; color: #333; }
        .btn-edit:hover { background: #d3d8de; }

        .btn-save { background: #007bff; color: #fff; display: none; }
        .btn-save:hover { background: #0056b3; }

        .readonly-hint { font-size: 11px; color: #ff4d4f; margin-top: 4px; display: none; }


        /* ✅ 在线用户列表样式 */
        .online-users-section {
            flex: 1;
            margin-top: 20px;
            overflow-y: auto;
        }

        .online-users-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e9ecef;
        }

        .online-user-item {
            display: flex;
            align-items: center;
            padding: 4px 0;
            font-size: 13px;
            color: #333;
        }

        .online-status-dot {
            width: 8px;
            height: 8px;
            background: #66CD66;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .current-user {
            font-weight: bold;
            color: #007bff;
        }

        .no-users {
            color: #999;
            font-size: 12px;
            padding: 10px 0;
        }

        /* ✅ 聊天区 */
        .chat-area {
            flex: 1;                  /* ✅ 关键：占据剩余空间 */
            display: flex;
            flex-direction: column;
            background: #fff;
            min-width: 0;             /* ✅ 关键：允许内容缩小 */
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f1f3f5;
            position: relative;
        }

        /* ✅ 加载动画样式 */
        .loading-indicator {
            position: absolute; /* ✅ 绝对定位 */
            top: 50%; /* ✅ 垂直居中 */
            left: 50%; /* ✅ 水平居中 */
            transform: translate(-50%, -50%); /* ✅ 精确居中 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 14px;
            z-index: 10; /* ✅ 确保在最上层 */
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .messages.loading {
            opacity: 0.7;
        }

        /* ✅ 消息容器：垂直排列 */
        .message {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
        }

        /* ✅ 自己发的：右对齐 */
        .message.self {
            align-items: flex-end;
        }

        /* ✅ 别人发的：左对齐 */
        .message.other {
            align-items: flex-start;
        }

        /* ✅ 发送者昵称 */
        .sender-name {
            font-size: 12px;
            color: #888;
            margin-bottom: 2px;
        }
        /* ✅ 开发者头衔样式 */
        .developer-badge {
            display: inline-block;
            background: linear-gradient(135deg, #8a2be2, #9370db); /* 紫色渐变 */
            color: white;
            font-size: 9px;
            font-weight: bold;
            padding: 1px 5px;
            border-radius: 8px;
            margin-left: 3px;
            vertical-align: middle;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
            box-shadow: 0 2px 4px rgba(138, 43, 226, 0.3);
            animation: badge-pulse 3s infinite;
        }

        /* ✅ 开发者头衔呼吸动画 */
        @keyframes badge-pulse {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }

        /* ✅ 自己发的消息不显示名字 */
        .message.self .sender-name {
            display: none;
        }

        /* ✅ 气泡样式（时间已移出） */
        .bubble {
            max-width: 80%;
            padding: 8px 10px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.3;
            word-break: break-word;
            text-align: left;
        }

        .self .bubble {
            background: #95ec69;
            border-bottom-right-radius: 4px;
        }

        .other .bubble {
            background: white;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 4px;
        }

        /* ✅ 时间样式（气泡下方两侧） */
        .time {
            font-size: 9px;
            color: #888;
            margin-top: 2px;
        }

        .self-time {
            text-align: right;
        }

        .other-time {
            text-align: left;
        }

        /* ✅ 输入区 */
        .input-area {
            display: flex;
            padding: 14px 20px;
            border-top: 1px solid #e9ecef;
            background: white;
            gap: 10px;

            /* ✅ 关键：防止输入区域被压缩 */
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            min-width: 0;             /* ✅ 允许输入框缩小 */
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .input-area button {
            flex-shrink: 0;           /* ✅ 关键：按钮绝不缩小 */
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            min-width: 60px;          /* ✅ 确保文字完整显示 */
        }

        .input-area input:focus {
            border-color: #007bff;
        }


        .input-area button:hover {
            background: #0056b3;
        }

        /* ✅ 滚动条美化 */
        .messages::-webkit-scrollbar {
            width: 5px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .online-users-section::-webkit-scrollbar {
            width: 4px;
        }

        .online-users-section::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 2px;
        }
        @media (max-width: 600px) {
            body {
                padding: 24px;
            }

            .card-container {
                height: calc(100vh - 48px);
                border-radius: 16px;
                max-width: 100%;
                min-width: 0; /* ✅ 允许子元素缩小 */
            }

            /* ✅ 侧边栏自适应 */
            .sidebar {
                min-width: 120px;      /* 手机端最小宽度 */
                padding: 15px;
                width: auto;
            }

            /* ✅ 聊天区域自适应 */
            .chat-area {
                min-width: 200px;      /* 确保聊天区域有足够空间 */
            }

            /* ✅ 输入区域：确保按钮不被挤压 */
            .input-area {
                padding: 10px 15px;
                gap: 8px;
            }

            .input-area input {
                padding: 8px 12px;
                font-size: 14px;
                min-width: 0;          /* ✅ 允许输入框缩小 */
            }

            .input-area button {
                padding: 8px 16px;
                font-size: 14px;
                flex-shrink: 0;        /* ✅ 关键：按钮绝不缩小 */
                min-width: 60px;       /* ✅ 确保文字完整显示 */
            }
        }
    </style>
</head>
<body>

<!-- ✅ 卡片容器 -->
<div class="card-container">
    <!-- 左侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>{{ current_user.username }}</h3>
            <p>在线</p>
        </div>

        <!-- ✅ 在线用户列表 -->
        <div class="online-users-section">
            <div class="online-users-title">在线用户 (<span id="online-count">0</span>)</div>
            <div id="online-users-list">
                <!-- 在线用户将动态添加到这里 -->
                <div class="no-users">暂无其他用户在线</div>
            </div>
        </div>

        <a href="/logout">退出登录</a>
    </div>

    <!-- 右侧聊天区 -->
    <div class="chat-area">
        <div class="messages" id="messages">
            <!-- ✅ 加载提示 -->
            <div id="loading-indicator" class="loading-indicator">
                <div class="loading-spinner"></div>
                <span>正在加载消息...</span>
            </div>
        </div>

        <div class="input-area">
            <input id="msg_input" placeholder="输入消息..." autocomplete="off">
            <button onclick="sendMsg()">发送</button>
        </div>
    </div>
</div>
<!-- ✅ 个人主页模态框 -->
<div id="profile-modal" class="profile-modal">
    <div class="profile-card">
        <button class="profile-close-btn" onclick="closeProfile()">&times;</button>

        <div class="profile-header">
            <div class="profile-avatar" id="profile-avatar">U</div>
            <div class="profile-meta">
                <h3 id="profile-username">用户名</h3>
                <div class="status-text">
                    <span class="status-dot" id="profile-status-dot" style="background:#66CD66"></span>
                    <span id="profile-status-text">在线</span>
                </div>
            </div>
        </div>

        <div class="profile-field">
            <div class="profile-label">真实姓名</div>
            <div class="profile-value" id="profile-realname-display"></div>
            <input type="text" class="profile-input" id="profile-realname-input" placeholder="请输入真实姓名">
        </div>

        <div class="profile-field">
            <div class="profile-label">个人简介</div>
            <div class="profile-value" id="profile-bio-display"></div>
            <textarea class="profile-input" id="profile-bio-input" rows="3" placeholder="请输入个人简介" style="resize: vertical;"></textarea>
        </div>

        <div class="profile-actions">
            <button class="btn-edit" id="btn-edit" onclick="toggleEdit()">编辑资料</button>
            <button class="btn-save" id="btn-save" onclick="saveProfile()">保存修改</button>
        </div>
    </div>
</div>

<script>
    window.currentUsername = "{{ current_user.username }}";
    const socket = io();

    /**
     * ✅ 页面加载时拉取历史消息
     */
    socket.on('connect', () => {
        console.log('✅ Socket 连接成功');

        const messagesContainer = document.getElementById('messages');
        const loadingIndicator = document.getElementById('loading-indicator');

        // 开始加载
        messagesContainer.classList.add('loading');

        fetch('/history')
            .then(res => res.json())
            .then(messages => {
                // 移除加载提示
                if (loadingIndicator) {
                    loadingIndicator.remove();
                }
                messagesContainer.classList.remove('loading');

                // 添加历史消息
                messages.forEach(appendMessage);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            })
            .catch(error => {
                console.error('加载历史消息失败:', error);
                if (loadingIndicator) {
                    loadingIndicator.innerHTML = '<div style="color:#ff4d4f;">加载失败，请刷新重试</div>';
                }
                messagesContainer.classList.remove('loading');
            });
    });

    socket.on('connect_error', (err) => {
        console.error('❌ Socket 连接失败:', err);
    });

    /**
     * ✅ 接收在线用户列表
     */
    socket.on('user_list', function (data) {
        updateUserList(data.users || []);
    });


    /**
 * ✅ 更新在线用户列表（在线优先，按注册顺序排序）
 */
    function updateUserList(users) {
        const container = document.getElementById('online-users-list');
        const countEl = document.getElementById('online-count');

        container.innerHTML = '';

        // 1. 分离在线和离线用户，保持各自的原始顺序
        const onlineUsers = [];
        const offlineUsers = [];

        users.forEach((user, index) => {
            // 保存原始索引用于排序
            user._originalIndex = index;

            if (user.online) {
                onlineUsers.push(user);
            } else {
                offlineUsers.push(user);
            }
        });

        // 2. 合并：在线用户在前，离线用户在后
        const sortedUsers = [...onlineUsers, ...offlineUsers];

        // 3. 更新在线人数统计
        countEl.textContent = onlineUsers.length;

        // 4. 渲染用户列表
        if (sortedUsers.length === 0) {
            const noUserDiv = document.createElement('div');
            noUserDiv.className = 'no-users';
            noUserDiv.textContent = '暂无其他用户在线';
            container.appendChild(noUserDiv);
        } else {
            sortedUsers.forEach(user => {
                // 改为 a 标签，作为链接指向个人主页
                const a = document.createElement('a');
                a.className = 'online-user-item';
                a.href = "javascript:void(0)"; // 阻止默认跳转，由JS控制

                const isMe = user.username === window.currentUsername;
                const dotColor = user.online ? '#66CD66' : '#cccccc';

                a.innerHTML = `
                    <span class="online-status-dot" style="background:${dotColor}"></span>
                    <span style="${isMe ? 'font-weight:bold;color:#007bff' : ''}">
                        ${user.username}${isMe ? ' (我)' : ''}
                    </span>
                `;

                // 点击打开个人主页
                a.onclick = () => openProfile(user);

                container.appendChild(a);
            });
        }

    }

    /**
     * ✅ 追加单条消息（时间移到气泡外）
     */
    function appendMessage(data) {
        const div = document.createElement('div');
        const isSelf = data.username === window.currentUsername;
        const isDeveloper = data.username === 'hyc';

        div.className = 'message ' + (isSelf ? 'self' : 'other');

        // ✅ 用户名（仅他人显示）+ 开发者头衔
        let senderHtml = '';
        if (!isSelf) {
            let developerBadge = '';
            if (isDeveloper) {
                developerBadge = `
                    <span class="developer-badge">开发者</span>
                `;
            }

            senderHtml = `
                <div class="sender-name">
                    ${data.username}${developerBadge}
                </div>
            `;
        }

        // ✅ 气泡 + 时间（时间放在气泡外面）
        div.innerHTML = `
            ${senderHtml}
            <div class="bubble">${data.content}</div>
            <div class="time ${isSelf ? 'self-time' : 'other-time'}">${data.timestamp}</div>
        `;
        document.getElementById('messages').appendChild(div);
    }

    /**
     * ✅ 发送消息
     */
    function sendMsg() {
        const input = document.getElementById('msg_input');
        const content = input.value.trim();
        if (!content) return;

        socket.emit('send_message', { content });
        input.value = '';
    }

    const msgInput = document.getElementById('msg_input');
    msgInput.addEventListener('keydown', function(event) {
        // 手机端 keyCode 13 = Enter 键（兼容 iOS/Android 主流浏览器）
        if (event.keyCode === 13 && !event.shiftKey) {
            event.preventDefault(); // 阻止手机端默认换行行为
            sendMsg();
        }
    });

    /**
     * ✅ 接收新消息（实时）
     */
    socket.on('new_message', function (data) {
        appendMessage(data);
        const box = document.getElementById('messages');
        box.scrollTop = box.scrollHeight;
    });
        /**
     * ✅ 个人主页逻辑
     */
    let currentProfileUser = null;
    let isEditing = false;

    function openProfile(user) {
        currentProfileUser = user;
        isEditing = false;

        // 渲染基础信息
        document.getElementById('profile-avatar').innerText = user.username.charAt(0).toUpperCase();
        document.getElementById('profile-username').innerText = user.username;

        // 渲染在线状态（不可编辑）
        const dotColor = user.online ? '#66CD66' : '#cccccc';
        const statusText = user.online ? '在线' : '离线';
        document.getElementById('profile-status-dot').style.background = dotColor;
        document.getElementById('profile-status-text').innerText = statusText;

        // 渲染可编辑字段
        const isMe = user.username === window.currentUsername;

        document.getElementById('profile-realname-input').value = user.realname || '';
        document.getElementById('profile-realname-display').innerText = user.realname || '未设置';
        document.getElementById('realname-hint').style.display = isMe ? 'none' : 'block';

        document.getElementById('profile-bio-input').value = user.bio || '';
        document.getElementById('profile-bio-display').innerText = user.bio || '这个人很懒，什么都没写';
        document.getElementById('bio-hint').style.display = isMe ? 'none' : 'block';

        updateProfileUIState(isMe, false);

        // 显示模态框
        document.getElementById('profile-modal').classList.add('active');
    }

    function closeProfile() {
        document.getElementById('profile-modal').classList.remove('active');
        currentProfileUser = null;
    }

    function updateProfileUIState(isMe, editing) {
        const realnameInput = document.getElementById('profile-realname-input');
        const bioInput = document.getElementById('profile-bio-input');
        const realnameDisplay = document.getElementById('profile-realname-display');
        const bioDisplay = document.getElementById('profile-bio-display');
        const editBtn = document.getElementById('btn-edit');
        const saveBtn = document.getElementById('btn-save');

        if (!isMe) {
            // 他人：隐藏输入框和编辑按钮
            realnameInput.style.display = 'none';
            bioInput.style.display = 'none';
            realnameDisplay.style.display = 'block';
            bioDisplay.style.display = 'block';
            editBtn.style.display = 'none';
            saveBtn.style.display = 'none';
        } else {
            // 自己
            if (editing) {
                realnameInput.style.display = 'block';
                bioInput.style.display = 'block';
                realnameDisplay.style.display = 'none';
                bioDisplay.style.display = 'none';
                editBtn.style.display = 'none';
                saveBtn.style.display = 'inline-block';
            } else {
                realnameInput.style.display = 'none';
                bioInput.style.display = 'none';
                realnameDisplay.style.display = 'block';
                bioDisplay.style.display = 'block';
                editBtn.style.display = 'inline-block';
                saveBtn.style.display = 'none';
            }
        }
    }

    function toggleEdit() {
        isEditing = true;
        const isMe = currentProfileUser.username === window.currentUsername;
        updateProfileUIState(isMe, true);
    }

    function saveProfile() {
        const realname = document.getElementById('profile-realname-input').value.trim();
        const bio = document.getElementById('profile-bio-input').value.trim();

        if (!realname) {
            alert('真实姓名不能为空！');
            return;
        }

        fetch('/update_profile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ realname: realname, bio: bio })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                currentProfileUser.realname = realname;
                currentProfileUser.bio = bio;

                document.getElementById('profile-realname-display').innerText = realname;
                document.getElementById('profile-bio-display').innerText = bio || '这个人很懒，什么都没写';

                isEditing = false;
                const isMe = currentProfileUser.username === window.currentUsername;
                updateProfileUIState(isMe, false);

                alert('资料更新成功！');
            } else {
                alert('更新失败：' + data.message);
            }
        })
        .catch(err => {
            alert('网络错误，请重试');
            console.error(err);
        });
    }


</script>

</body>
</html>
