<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时聊天</title>

    <!-- ✅ Socket.IO 库 -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* ✅ 卡片容器 */
        .card-container {
            display: flex;
            width: 100%;
            max-width: 900px;
            height: calc(100vh - 140px);
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            box-sizing: border-box;
        }
        @media (max-width: 600px) {
            .card-container {
                height: 100vh;
                border-radius: 0;
                max-width: 100%;
            }

            body {
                padding: 0;
            }
        }

        /* ✅ 侧边栏 */
        .sidebar {
            width: 240px;
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            margin-bottom: 20px;
        }

        .sidebar h3 {
            color: #333;
            margin-bottom: 6px;
            font-size: 17px;
        }

        .sidebar p {
            color: #66CD66;
            font-size: 12px;
        }

        .sidebar a {
            color: #666;
            text-decoration: none;
            font-size: 13px;
            margin-top: 20px;
        }

        .sidebar a:hover {
            color: #007bff;
        }

        /* ✅ 在线用户列表样式 */
        .online-users-section {
            flex: 1;
            margin-top: 20px;
            overflow-y: auto;
        }

        .online-users-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e9ecef;
        }

        .online-user-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            font-size: 13px;
            color: #333;
        }

        .online-status-dot {
            width: 8px;
            height: 8px;
            background: #66CD66;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .current-user {
            font-weight: bold;
            color: #007bff;
        }

        .no-users {
            color: #999;
            font-size: 12px;
            padding: 10px 0;
        }

        /* ✅ 聊天区 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f1f3f5;
            position: relative;
        }

        /* ✅ 加载动画样式 */
        .loading-indicator {
            position: absolute; /* ✅ 绝对定位 */
            top: 50%; /* ✅ 垂直居中 */
            left: 50%; /* ✅ 水平居中 */
            transform: translate(-50%, -50%); /* ✅ 精确居中 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 14px;
            z-index: 10; /* ✅ 确保在最上层 */
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .messages.loading {
            opacity: 0.7;
        }

        /* ✅ 消息容器：垂直排列 */
        .message {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
        }

        /* ✅ 自己发的：右对齐 */
        .message.self {
            align-items: flex-end;
        }

        /* ✅ 别人发的：左对齐 */
        .message.other {
            align-items: flex-start;
        }

        /* ✅ 发送者昵称 */
        .sender-name {
            font-size: 12px;
            color: #888;
            margin-bottom: 2px;
        }

        /* ✅ 自己发的消息不显示名字 */
        .message.self .sender-name {
            display: none;
        }

        /* ✅ 气泡样式（时间已移出） */
        .bubble {
            max-width: 80%;
            padding: 8px 10px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.3;
            word-break: break-word;
            text-align: left;
        }

        .self .bubble {
            background: #95ec69;
            border-bottom-right-radius: 4px;
        }

        .other .bubble {
            background: white;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 4px;
        }

        /* ✅ 时间样式（气泡下方两侧） */
        .time {
            font-size: 9px;
            color: #888;
            margin-top: 2px;
        }

        .self-time {
            text-align: right;
        }

        .other-time {
            text-align: left;
        }

        /* ✅ 输入区 */
        .input-area {
            display: flex;
            padding: 14px 20px;
            border-top: 1px solid #e9ecef;
            background: white;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            min-width: 0;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .input-area input:focus {
            border-color: #007bff;
        }

        .input-area button {
            flex-shrink: 0;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .input-area button:hover {
            background: #0056b3;
        }

        /* ✅ 滚动条美化 */
        .messages::-webkit-scrollbar {
            width: 5px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .online-users-section::-webkit-scrollbar {
            width: 4px;
        }

        .online-users-section::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 2px;
        }
    </style>
</head>
<body>

<!-- ✅ 卡片容器 -->
<div class="card-container">
    <!-- 左侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>{{ current_user.username }}</h3>
            <p>在线</p>
        </div>

        <!-- ✅ 在线用户列表 -->
        <div class="online-users-section">
            <div class="online-users-title">在线用户 (<span id="online-count">0</span>)</div>
            <div id="online-users-list">
                <!-- 在线用户将动态添加到这里 -->
                <div class="no-users">暂无其他用户在线</div>
            </div>
        </div>

        <a href="/logout">退出登录</a>
    </div>

    <!-- 右侧聊天区 -->
    <div class="chat-area">
        <div class="messages" id="messages">
            <!-- ✅ 加载提示 -->
            <div id="loading-indicator" class="loading-indicator">
                <div class="loading-spinner"></div>
                <span>正在加载消息...</span>
            </div>
        </div>

        <div class="input-area">
            <input id="msg_input" placeholder="输入消息..." autocomplete="off">
            <button onclick="sendMsg()">发送</button>
        </div>
    </div>
</div>

<script>
    const socket = io({
        transports: ['websocket'],
        upgrade: false
    });

    const currentUsername = "{{ current_user.username }}";

    /**
     * ✅ 页面加载时拉取历史消息
     */
    socket.on('connect', () => {
        console.log('✅ Socket 连接成功');

        const messagesContainer = document.getElementById('messages');
        const loadingIndicator = document.getElementById('loading-indicator');

        // 开始加载
        messagesContainer.classList.add('loading');

        fetch('/history')
            .then(res => res.json())
            .then(messages => {
                // 移除加载提示
                if (loadingIndicator) {
                    loadingIndicator.remove();
                }
                messagesContainer.classList.remove('loading');

                // 添加历史消息
                messages.forEach(appendMessage);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            })
            .catch(error => {
                console.error('加载历史消息失败:', error);
                if (loadingIndicator) {
                    loadingIndicator.innerHTML = '<div style="color:#ff4d4f;">加载失败，请刷新重试</div>';
                }
                messagesContainer.classList.remove('loading');
            });
    });

    socket.on('connect_error', (err) => {
        console.error('❌ Socket 连接失败:', err);
    });

    /**
     * ✅ 接收在线用户列表
     */
    socket.on('online_users', function(data) {
        updateOnlineUsersList(data.users || []);
    });

    /**
     * ✅ 更新在线用户列表
     */
    function updateOnlineUsersList(users) {
        const onlineUsersList = document.getElementById('online-users-list');
        const onlineCount = document.getElementById('online-count');

        // 更新在线人数
        onlineCount.textContent = users.length;

        // 清空现有列表
        onlineUsersList.innerHTML = '';

        if (users.length === 0) {
            onlineUsersList.innerHTML = '<div class="no-users">暂无其他用户在线</div>';
            return;
        }

        // 添加用户到列表
        users.forEach(username => {
            const userItem = document.createElement('div');
            userItem.className = 'online-user-item';

            if (username === currentUsername) {
                userItem.classList.add('current-user');
                userItem.innerHTML = `
                    <div class="online-status-dot"></div>
                    <span>${username} (我)</span>
                `;
            } else {
                userItem.innerHTML = `
                    <div class="online-status-dot"></div>
                    <span>${username}</span>
                `;
            }

            onlineUsersList.appendChild(userItem);
        });
    }

    /**
     * ✅ 追加单条消息（时间移到气泡外）
     */
    function appendMessage(data) {
        const div = document.createElement('div');
        const isSelf = data.username === currentUsername;

        div.className = 'message ' + (isSelf ? 'self' : 'other');

        // ✅ 用户名（仅他人显示）
        const senderHtml = !isSelf ? `
            <div class="sender-name">${data.username}</div>
        ` : '';

        // ✅ 气泡 + 时间（时间放在气泡外面）
        div.innerHTML = `
            ${senderHtml}
            <div class="bubble">${data.content}</div>
            <div class="time ${isSelf ? 'self-time' : 'other-time'}">${data.timestamp}</div>
        `;
        document.getElementById('messages').appendChild(div);
    }

    /**
     * ✅ 发送消息
     */
    function sendMsg() {
        const input = document.getElementById('msg_input');
        const content = input.value.trim();
        if (!content) return;

        socket.emit('send_message', { content });
        input.value = '';
    }

    const msgInput = document.getElementById('msg_input');
    msgInput.addEventListener('keydown', function(event) {
        // 手机端 keyCode 13 = Enter 键（兼容 iOS/Android 主流浏览器）
        if (event.keyCode === 13 && !event.shiftKey) {
            event.preventDefault(); // 阻止手机端默认换行行为
            sendMsg();
        }
    });

    /**
     * ✅ 接收新消息（实时）
     */
    socket.on('new_message', function (data) {
        appendMessage(data);
        const box = document.getElementById('messages');
        box.scrollTop = box.scrollHeight;
    });
</script>

</body>
</html>
