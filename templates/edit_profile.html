<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>编辑资料</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 420px;
            max-width: 90vw;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }

        h1 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 16px;
            font-size: 14px;
            color: #555;
        }

        input, textarea {
            width: 100%;
            margin-top: 6px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            margin-top: 24px;
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        .back {
            display: block;
            margin-top: 16px;
            text-align: center;
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>编辑资料</h1>

    <form method="post">
        <label>在线状态</label>
        <input name="status" value="{{ user.status }}">

        <label>真实姓名</label>
        <input name="real_name" value="{{ user.real_name }}">

        <label>个人介绍</label>
        <textarea name="bio">{{ user.bio }}</textarea>

        <button type="submit">保存</button>
    </form>

    <a class="back" href="{{ url_for('chat.user_profile', username=user.username) }}">返回个人主页</a>
</div>
</body>
</html>
