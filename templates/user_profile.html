<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>{{ user.username }} 的个人主页</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            width: 400px;
            max-width: 90vw;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            box-sizing: border-box;
        }

        .card h1 {
            margin: 0 0 10px;
            font-size: 24px;
        }

        .status {
            color: #666;
            margin-bottom: 20px;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            font-size: 12px;
            color: #888;
        }

        .field div {
            margin-top: 4px;
            color: #222;
        }

        .actions {
            margin-top: 30px;
        }

        .btn {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        {{ user.username }}
        {% if user.username == 'hyc' %}
            <span class="developer-badge">开发者</span>
        {% endif %}
    </h1>

    <div class="status">状态：{{ user.status }}</div>

    <div class="field">
        <label>真实姓名</label>
        <div>{{ user.real_name or '未填写' }}</div>
    </div>

    <div class="field">
        <label>个人介绍</label>
        <div>{{ user.bio or '这个人很懒，什么都没写～' }}</div>
    </div>

    {% if user.id == current_user.id %}
    <div class="actions">
        <a href="{{ url_for('chat.edit_profile') }}" class="btn">编辑资料</a>
    </div>
    {% endif %}

    <div style="margin-top: 20px;">
        <a href="/chat" style="color:#007bff;text-decoration:none;">← 返回聊天室</a>
    </div>
</div>
</body>
</html>
