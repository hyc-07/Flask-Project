<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card-container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            padding: 32px;
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 24px;
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: #007bff;
        }

        .error {
            color: #ff4d4f;
            font-size: 12px;
            margin-top: 4px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover {
            background: #0056b3;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .login-link a {
            color: #007bff;
            text-decoration: none;
        }

        .flash {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .flash.error {
            background: #fff2f0;
            color: #ff4d4f;
            border: 1px solid #ffccc7;
        }
    </style>
</head>
<body>

<div class="card-container">
    <h2>用户登录</h2>

    <!-- ✅ 错误提示（和注册页统一） -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="post">
        <!-- ✅ CSRF 令牌（如果用 Flask-WTF 需要，原生 form 可注释） -->
        {# {{ form.hidden_tag() }} #}

        <div class="form-group">
            <label>用户名</label>
            <input name="username" placeholder="请输入用户名" required>
        </div>

        <div class="form-group">
            <label>密码</label>
            <input name="password" type="password" placeholder="请输入密码" required>
        </div>

        <button type="submit">登录</button>
    </form>

    <div class="login-link">
        还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a>
    </div>
</div>

</body>
</html>
